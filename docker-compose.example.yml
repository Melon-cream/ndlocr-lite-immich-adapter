services:
  ndlocr-lite-immich-adapter:
    image: ghcr.io/melon-cream/ndlocr-lite-immich-adapter:latest
    container_name: ndlocr-lite-immich-adapter
    ports:
      - "3003:3003"
    environment:
      HOST: 0.0.0.0
      PORT: 3003
      LOG_LEVEL: INFO
      DEVICE: cpu
      MODEL_DIR: /opt/ndlocr-lite/src/model
      MAX_IMAGE_PIXELS: 40000000
      REQUEST_TIMEOUT: 120
      NDL_OCR_LITE_DIR: /opt/ndlocr-lite
      NDL_OCR_LITE_VENV_DIR: /opt/ndlocr-lite-venv
      NDL_OCR_LITE_REPO: https://github.com/ndl-lab/ndlocr-lite.git
      NDL_OCR_LITE_REF: master
      BOOTSTRAP_NDL_OCR_LITE: "true"
      NDL_OCR_LITE_BOOTSTRAP_TIMEOUT: 600
      NDL_OCR_LITE_PYTHON: /opt/ndlocr-lite-venv/bin/python
    volumes:
      - ndlocr-lite-source:/opt/ndlocr-lite
      - ndlocr-lite-venv:/opt/ndlocr-lite-venv

volumes:
  ndlocr-lite-source:
  ndlocr-lite-venv:

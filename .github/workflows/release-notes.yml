name: Release Notes From Changelog

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  update-release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract changelog section
        id: changelog
        run: python .github/scripts/extract_changelog.py "${{ github.event.release.tag_name }}"

      - name: Update GitHub release body
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.event.release.tag_name }}" --notes-file .github/release-notes.md
